name: Assist-ER Pro Maintenance

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 */4 * * *'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e .[dev]
      - run: ruff check src tests
      - run: pytest
  automation:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Assist-ER Pro automation hooks executed"
